<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Platform Guru SD/SMP/SMA</title>
    <meta name="description" content="Reset password akun Anda untuk Platform Administrasi Kelas Digital">
    
    <!-- Prevent Cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ✅ Consistent with platform design */
        .reset-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid #7c3aed;
        }
        .reset-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .reset-input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #0891b2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.3);
        }
        .reset-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            display: block;
        }
        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
            display: block;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-link:hover {
            color: #7c3aed;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="reset-card">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-purple-100 rounded-full mb-4">
                <i class="fas fa-key text-purple-600 text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
            <p class="text-gray-600 mt-2">Masukkan email dan password baru Anda</p>
        </div>
        
        <!-- Message Display -->
        <div id="message" class="message" role="alert" aria-live="polite"></div>
        
        <!-- Form -->
        <form id="resetForm">
            <!-- Email Field -->
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                <i class="fas fa-envelope mr-2"></i>Email
            </label>
            <input type="email" id="email" class="reset-input" placeholder="nama@sekolah.sch.id" required autocomplete="email">
            
            <!-- New Password Field -->
            <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">
                <i class="fas fa-lock mr-2"></i>Password Baru
            </label>
            <input type="password" id="newPassword" class="reset-input" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password">
            <p class="text-xs text-gray-500 -mt-12 mb-4 ml-1">
                <i class="fas fa-info-circle mr-1"></i>Minimal 6 karakter
            </p>
            
            <!-- Confirm Password Field -->
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                <i class="fas fa-lock mr-2"></i>Konfirmasi Password
            </label>
            <input type="password" id="confirmPassword" class="reset-input" placeholder="Ulangi password baru" required minlength="6" autocomplete="new-password">
            
            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="reset-btn">
                <i class="fas fa-sync-alt"></i>
                <span id="btnText">Reset Password</span>
                <i id="loadingIcon" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>
        
        <!-- Back to Login Link -->
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali ke Login
        </a>
    </div>

    <!-- Firebase + Logic Script -->
    <script type="module">
        import { 
            auth,
            sendPasswordResetEmail,
            updatePassword,
            EmailAuthProvider,
            reauthenticateWithCredential
        } from './modules/firebase-config.js';
        
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        console.log('🔴 [Reset Password] Script START');
        
        const form = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        
        let currentUser = null;
        
        // ✅ Check auth state
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log('✅ [Reset Password] User logged in:', user.email);
                // Auto-fill email for logged-in user
                document.getElementById('email').value = user.email;
                document.getElementById('email').disabled = true;
                document.getElementById('email').classList.add('bg-gray-100');
            }
        });
        
        // ✅ Show message helper
        function showMessage(text, type = 'success') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // ✅ Set loading state
        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.textContent = loading ? 'Memproses...' : 'Reset Password';
            loadingIcon.classList.toggle('hidden', !loading);
        }
        
        // ✅ Validate passwords match
        function validatePasswords() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('❌ Password baru dan konfirmasi tidak sama!', 'error');
                return false;
            }
            
            if (newPassword.length < 6) {
                showMessage('❌ Password minimal 6 karakter!', 'error');
                return false;
            }
            
            return true;
        }
        
        // ✅ Handle form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            
            // Validate
            if (!validatePasswords()) return;
            
            setLoading(true);
            showMessage('', 'success');
            
            try {
                if (currentUser && currentUser.email === email) {
                    // ✅ User logged in: Update password directly
                    console.log('🔄 [Reset Password] Updating password for logged-in user...');
                    
                    // Re-authenticate required for sensitive operations
                    const password = prompt('🔐 Untuk keamanan, masukkan password lama Anda:');
                    if (!password) {
                        showMessage('❌ Verifikasi dibatalkan.', 'error');
                        setLoading(false);
                        return;
                    }
                    
                    const credential = EmailAuthProvider.credential(currentUser.email, password);
                    await reauthenticateWithCredential(currentUser, credential);
                    
                    await updatePassword(currentUser, newPassword);
                    
                    showMessage('✅ Password berhasil diubah! Silakan login dengan password baru.', 'success');
                    console.log('✅ [Reset Password] Password updated successfully');
                    
                    // Clear form after success
                    form.reset();
                    
                } else {
                    // ✅ User not logged in: Send reset email
                    console.log('📧 [Reset Password] Sending password reset email to:', email);
                    
                    await sendPasswordResetEmail(auth, email);
                    
                    showMessage('✅ Email reset password telah dikirim ke ' + email + '. Cek inbox dan spam folder Anda!', 'success');
                    console.log('✅ [Reset Password] Reset email sent');
                    
                    // Clear form after success
                    form.reset();
                }
                
            } catch (error) {
                console.error('❌ [Reset Password] Error:', error);
                
                let errorMessage = '❌ Gagal reset password. ';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage += 'Email tidak terdaftar di sistem.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage += 'Format email tidak valid.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage += 'Terlalu banyak permintaan. Tunggu beberapa saat lalu coba lagi.';
                } else if (error.code === 'auth/requires-recent-login') {
                    errorMessage += 'Login ulang diperlukan untuk keamanan. Silakan login kembali.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage += 'Password terlalu lemah. Gunakan kombinasi huruf dan angka.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage += 'Password lama tidak sesuai.';
                } else {
                    errorMessage += error.message || 'Silakan coba lagi nanti.';
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        });
        
        console.log('🟢 [Reset Password] READY');
    </script>
</body>
</html>
