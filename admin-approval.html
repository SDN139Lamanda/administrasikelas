<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval User - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-shield-alt text-purple-600 text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800">Admin Dashboard</h1>
                        <p class="text-xs text-gray-500">Approval User</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <a href="dashboard.html" class="text-gray-600 hover:text-purple-600 font-medium">Dashboard</a>
                    <button onclick="logout()" class="text-red-600 hover:text-red-800 font-medium">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="loadingAuth" class="text-center py-12">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
            <p class="text-gray-500 mt-4">Memuat...</p>
        </div>
        
        <div id="content" class="hidden"></div>
    </div>
    
    <script type="module">
        import { render } from './modules/admin-approval.js';
        import { auth } from './config-firebase.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        
        onAuthStateChanged(auth, (user) => {
            document.getElementById('loadingAuth').classList.add('hidden');
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            if (user.email !== 'andi@139batuassung.com') {
                document.getElementById('content').innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-circle text-5xl text-red-500 mb-4"></i>
                        <h2 class="text-xl font-bold text-gray-800">Akses Ditolak</h2>
                        <p class="text-gray-500 mt-2">Hanya admin yang bisa akses halaman ini</p>
                        <a href="dashboard.html" class="text-purple-600 hover:text-purple-800 mt-4 inline-block">Kembali ke Dashboard</a>
                    </div>
                `;
                document.getElementById('content').classList.remove('hidden');
                return;
            }
            
            document.getElementById('content').appendChild(render());
            document.getElementById('content').classList.remove('hidden');
        });
        
        window.logout = async () => {
            await auth.signOut();
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
