<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SDN 139 Lamanda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc; color: #1e293b;
    }
    
    /* Loading Screen - Wajib Ada */
    #loading {
      position: fixed; inset: 0; background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: #64748b; z-index: 9999;
    }
    
    /* Navbar */
    .navbar {
      background: white; padding: 15px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-weight: 700; color: #667eea; display: flex; align-items: center; gap: 8px; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .user-email { color: #64748b; font-size: 0.9rem; }
    .btn-logout {
      padding: 8px 16px; background: #ef4444; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-logout:hover { background: #dc2626; }
    
    /* Main Content */
    .main { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .card {
      background: white; padding: 25px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
    }
    .card h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .card p { color: #64748b; }
    
    /* Menu Grid */
    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px; margin-top: 20px;
    }
    .menu-item {
      padding: 20px; background: #f1f5f9; border-radius: 10px;
      text-align: center; cursor: pointer; transition: 0.2s;
    }
    .menu-item:hover { background: #e2e8f0; transform: translateY(-2px); }
    .menu-item.coming { opacity: 0.6; cursor: not-allowed; }
    .menu-item h4 { margin-bottom: 5px; }
    .menu-item span { font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">🔄 Memeriksa login...</div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">🏫 SDN 139 Lamanda</div>
    <div class="user-info">
      <span class="user-email" id="userEmail">-</span>
      <button class="btn-logout" id="logoutBtn">Keluar</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="card">
      <h1>👋 Selamat Datang, <span id="welcomeName">User</span>!</h1>
      <p>Kelola data akademik sekolah dengan mudah.</p>
    </div>

    <div class="card">
      <h3>📦 Menu</h3>
      <div class="menu-grid">
        <div class="menu-item coming">
          <h4>📚 Data Siswa</h4>
          <span>Segera</span>
        </div>
        <div class="menu-item coming">
          <h4>👨‍🏫 Data Guru</h4>
          <span>Segera</span>
        </div>
        <div class="menu-item coming">
          <h4>📊 Nilai</h4>
          <span>Segera</span>
        </div>
        <div class="menu-item coming">
          <h4>📅 Jadwal</h4>
          <span>Segera</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Script -->
  <script type="module">
    // 🔗 Import dari config-firebase.js (path harus sama dengan login.html)
    import { auth } from './config-firebase.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const loading = document.getElementById('loading');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    const welcomeName = document.getElementById('welcomeName');

    // 🔐 CEK AUTH STATE - INI KUNCI REDIRECT YANG BENAR
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // ❌ User belum login → redirect ke login.html
        console.log('❌ Tidak ada user, redirect ke login');
        window.location.href = 'login.html';
        return;
      }

      // ✅ User sudah login → tampilkan dashboard
      console.log('✅ User login:', user.email);
      
      // Tampilkan data user
      userEmail.textContent = user.email;
      welcomeName.textContent = user.email.split('@')[0];
      
      // Sembunyikan loading screen
      loading.style.display = 'none';
    });

    // 🚪 Fungsi Logout
    logoutBtn.addEventListener('click', async () => {
      if (confirm('Apakah Anda yakin ingin keluar?')) {
        try {
          await signOut(auth);
          // Setelah logout, onAuthStateChanged akan otomatis redirect ke login
        } catch (error) {
          console.error('Logout error:', error);
          alert('Gagal logout: ' + error.message);
        }
      }
    });
  </script>
</body>
</html>
