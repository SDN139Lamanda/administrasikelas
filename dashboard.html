<!-- ✅ SAFE MODE: Dashboard Filtering (With Error Boundary) -->
<script type="module">
    console.log('🔴 [Dashboard Filter] Safe Mode START');
    
    try {
        // ✅ Import Firebase modules (with error handling)
        const firebaseModules = await import('./modules/firebase-config.js');
        const { auth, onAuthStateChanged, db, doc, getDoc } = firebaseModules;
        
        if (!auth || !onAuthStateChanged) {
            throw new Error('Firebase auth modules not exported correctly');
        }
        
        console.log('✅ [Filter] Firebase modules imported');
        
        // DOM Elements (with null checks)
        const els = {
            profileMenuBtn: document.getElementById('profileMenuBtn'),
            profileDropdown: document.getElementById('profileDropdown'),
            profileName: document.getElementById('profileName'),
            profileEmailSub: document.getElementById('profileEmailSub'),
            userEmail: document.getElementById('userEmail'),
            userAvatar: document.getElementById('userAvatar'),
            userContextBadge: document.getElementById('userContextBadge'),
            userContextText: document.getElementById('userContextText')
        };
        
        // Profile dropdown (preserved)
        if (els.profileMenuBtn && els.profileDropdown) {
            els.profileMenuBtn.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                els.profileDropdown.classList.toggle('hidden'); 
            });
            document.addEventListener('click', (e) => { 
                if (!els.profileDropdown?.contains(e.target) && !els.profileMenuBtn?.contains(e.target)) {
                    els.profileDropdown?.classList.add('hidden'); 
                } 
            });
        }
        
        // ✅ Filtering function (with safety checks)
        function applyFilter(userData) {
            try {
                if (!userData) return;
                
                const jenjang = userData.jenjang_sekolah;
                const kelasDiampu = userData.kelas_diampu || [];
                const role = userData.role || 'teacher';
                const sdMapelType = userData.sd_mapel_type || 'kelas';
                
                console.log('🔍 [Filter] Applying:', { jenjang, kelasDiampu, role });
                
                // Update context badge
                if (els.userContextBadge && els.userContextText) {
                    els.userContextBadge.classList.remove('hidden');
                    if (role === 'admin') {
                        els.userContextText.innerHTML = '<i class="fas fa-crown text-yellow-500 mr-1"></i> Admin';
                    } else if (jenjang) {
                        const label = {sd:'SD', smp:'SMP', sma:'SMA'}[jenjang] || jenjang.toUpperCase();
                        const extra = (jenjang==='sd' && sdMapelType!=='kelas') ? ` • ${sdMapelType.toUpperCase()}` : '';
                        els.userContextText.textContent = `Guru ${label}${extra}`;
                    }
                }
                
                // Filter jenjang
                if (jenjang && role === 'teacher') {
                    ['sd','smp','sma'].forEach(j => {
                        document.querySelector(`.room-card[data-jenjang="${j}"]`)?.classList.add('hidden');
                        document.getElementById(`${j}-section`)?.classList.add('hidden');
                    });
                    document.querySelector(`.room-card[data-jenjang="${jenjang}"]`)?.classList.remove('hidden');
                    document.getElementById(`${jenjang}-section`)?.classList.remove('hidden');
                }
                
                // Filter kelas cards
                if (kelasDiampu.length > 0 && role === 'teacher') {
                    document.querySelectorAll('.kelas-card[data-kelas]').forEach(card => {
                        const k = card.getAttribute('data-kelas');
                        if (jenjang === 'sd' && sdMapelType !== 'kelas') {
                            card.classList.remove('hidden');
                        } else {
                            card.classList.toggle('hidden', !kelasDiampu.includes(k));
                        }
                    });
                }
                
                console.log('🎉 [Filter] Done');
            } catch (e) {
                console.error('❌ [Filter] applyFilter error:', e);
            }
        }
        
        // ✅ Main: Auth state listener
        onAuthStateChanged(auth, async (user) => {
            try {
                console.log('🔐 [Filter] Auth:', user ? `IN (${user.uid})` : 'OUT');
                
                if (!user) {
                    // Reset on logout
                    ['sd','smp','sma'].forEach(j => document.getElementById(`${j}-section`)?.classList.add('hidden'));
                    return;
                }
                
                // Load from Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    console.warn('⚠️ [Filter] User doc not found');
                    return;
                }
                
                const userData = userDoc.data();
                
                // Validate required field
                if (!userData.jenjang_sekolah) {
                    console.error('❌ [Filter] Missing field: jenjang_sekolah');
                    console.error('🔧 Fix: Add field "jenjang_sekolah" (string) to users/[uid] in Firestore');
                    return;
                }
                
                // Apply filter
                applyFilter(userData);
                
                // Update cache
                localStorage.setItem('user_jenjang', userData.jenjang_sekolah || '');
                localStorage.setItem('user_kelas_diampu', JSON.stringify(userData.kelas_diampu || []));
                
                // Update profile
                if (els.profileName) els.profileName.textContent = userData.nama_lengkap || 'User';
                if (els.userEmail) els.userEmail.textContent = user.email || '';
                
            } catch (e) {
                console.error('❌ [Filter] Auth callback error:', e);
                // Fallback: try localStorage
                const cached = localStorage.getItem('user_jenjang');
                if (cached) {
                    console.log('🔄 [Filter] Using localStorage fallback');
                    applyFilter({
                        jenjang_sekolah: cached,
                        kelas_diampu: JSON.parse(localStorage.getItem('user_kelas_diampu') || '[]'),
                        role: 'teacher',
                        sd_mapel_type: 'kelas'
                    });
                }
            }
        });
        
        console.log('🟢 [Dashboard Filter] Safe Mode READY');
        
    } catch (error) {
        console.error('❌❌❌ [Dashboard Filter] CRITICAL ERROR ❌❌❌');
        console.error('Error:', error.message);
        console.error('Stack:', error.stack);
        console.error('💡 This might cause white screen. Check:');
        console.error('  1. File ./modules/firebase-config.js exists?');
        console.error('  2. File exports auth, onAuthStateChanged, db, doc, getDoc?');
        console.error('  3. No syntax errors in this script?');
        
        // Show visible error on page for debugging
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            if (main) {
                main.innerHTML = `
                    <div style="padding:40px;text-align:center;color:#991b1b;">
                        <h2>❌ Dashboard Error</h2>
                        <p><strong>${error.message}</strong></p>
                        <p style="font-size:12px;color:#6b7280;">Buka Console (F12) untuk detail error</p>
                        <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#7c3aed;color:white;border:none;border-radius:6px;cursor:pointer;">Reload Page</button>
                    </div>
                `;
            }
        });
    }
</script>
