<!-- ✅ UPDATED: Dashboard Filtering (Timing-Safe + Preserved Logic) -->
<script type="module">
    import { auth, onAuthStateChanged, db, doc, getDoc } from './modules/firebase-config.js';
    
    console.log('🔴 [Dashboard Filter] Timing-Safe v3 START');
    
    // ✅ Wait for FULL page load (images, styles, all scripts)
    window.addEventListener('load', async () => {
        console.log('✅ [Filter] Full page loaded');
        
        // DOM Elements with explicit null checks
        const els = {
            profileMenuBtn: document.getElementById('profileMenuBtn'),
            profileDropdown: document.getElementById('profileDropdown'),
            profileName: document.getElementById('profileName'),
            profileEmailSub: document.getElementById('profileEmailSub'),
            userEmail: document.getElementById('userEmail'),
            userAvatar: document.getElementById('userAvatar'),
            userContextBadge: document.getElementById('userContextBadge'),
            userContextText: document.getElementById('userContextText')
        };
        
        // ✅ Profile Dropdown Toggle (PRESERVED EXACTLY)
        if (els.profileMenuBtn && els.profileDropdown) {
            els.profileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                els.profileDropdown.classList.toggle('hidden');
            });
            document.addEventListener('click', (e) => {
                if (!els.profileDropdown?.contains(e.target) && !els.profileMenuBtn?.contains(e.target)) {
                    els.profileDropdown?.classList.add('hidden');
                }
            });
        }
        
        // ✅ Load user data from Firestore (PRESERVED LOGIC)
        async function loadUserData(userId) {
            try {
                console.log('👤 [Filter] Loading user:', userId);
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    console.log('✅ [Filter] User data:', {
                        jenjang: data.jenjang_sekolah,
                        kelas_diampu: data.kelas_diampu,
                        role: data.role,
                        sd_mapel_type: data.sd_mapel_type
                    });
                    return data;
                }
                console.warn('⚠️ [Filter] User doc not found');
                return null;
            } catch (e) {
                console.error('❌ [Filter] Error:', e);
                return null;
            }
        }
        
        // ✅ Apply filtering (PRESERVED LOGIC + Enhanced Safety)
        function applyFilter(userData) {
            if (!userData) {
                console.log('⚠️ [Filter] No userData, skip');
                return;
            }
            
            const jenjang = userData.jenjang_sekolah;
            const kelasDiampu = userData.kelas_diampu || [];
            const role = userData.role || 'teacher';
            const sdMapelType = userData.sd_mapel_type || 'kelas';
            
            console.log('🔍 [Filter] Applying filter:', { jenjang, kelasDiampu, role, sdMapelType });
            
            // Update context badge (PRESERVED)
            if (els.userContextBadge && els.userContextText) {
                els.userContextBadge.classList.remove('hidden');
                if (role === 'admin') {
                    els.userContextText.innerHTML = '<i class="fas fa-crown text-yellow-500 mr-1"></i> Admin';
                } else if (jenjang) {
                    const label = {sd:'SD', smp:'SMP', sma:'SMA'}[jenjang] || jenjang.toUpperCase();
                    const extra = (jenjang==='sd' && sdMapelType!=='kelas') ? ` • ${sdMapelType.toUpperCase()}` : '';
                    els.userContextText.textContent = `Guru ${label}${extra}`;
                }
            }
            
            // Filter jenjang rooms & sections (PRESERVED LOGIC)
            if (jenjang && role === 'teacher') {
                console.log(`🎯 Filtering jenjang: hide all, show "${jenjang}"`);
                
                // Hide ALL jenjang first (explicit)
                ['sd','smp','sma'].forEach(j => {
                    const room = document.querySelector(`.room-card[data-jenjang="${j}"]`);
                    const section = document.getElementById(`${j}-section`);
                    if (room) {
                        room.classList.add('hidden');
                        console.log(`  - Hidden room: ${j}`);
                    }
                    if (section) {
                        section.classList.add('hidden');
                        console.log(`  - Hidden section: ${j}`);
                    }
                });
                
                // Show ONLY matching jenjang (explicit)
                const matchingRoom = document.querySelector(`.room-card[data-jenjang="${jenjang}"]`);
                const matchingSection = document.getElementById(`${jenjang}-section`);
                
                if (matchingRoom) {
                    matchingRoom.classList.remove('hidden');
                    console.log(`✅ Show room: ${jenjang}`);
                }
                if (matchingSection) {
                    matchingSection.classList.remove('hidden');
                    console.log(`✅ Show section: ${jenjang}`);
                }
            }
            
            // Filter kelas cards (PRESERVED LOGIC)
            if (kelasDiampu.length > 0 && role === 'teacher') {
                console.log(`🎯 Filtering kelas cards: ${kelasDiampu.join(', ')}`);
                
                document.querySelectorAll('.kelas-card[data-kelas]').forEach(card => {
                    const k = card.getAttribute('data-kelas');
                    
                    // Special: SD Guru PAI/PJOK shows ALL classes
                    if (jenjang === 'sd' && sdMapelType !== 'kelas') {
                        card.classList.remove('hidden');
                        console.log(`  - Show kelas ${k} (PAI/PJOK)`);
                    } else {
                        // Regular: show only assigned classes
                        if (kelasDiampu.includes(k)) {
                            card.classList.remove('hidden');
                            console.log(`  - Show kelas ${k}`);
                        } else {
                            card.classList.add('hidden');
                            console.log(`  - Hide kelas ${k}`);
                        }
                    }
                });
            }
            
            console.log('🎉 [Filter] Filtering complete!');
        }
        
        // ✅ Auth state listener (PRESERVED LOGIC + Timing Fix)
        onAuthStateChanged(auth, async (user) => {
            console.log('🔐 [Filter] Auth state:', user ? `LOGGED IN (${user.uid})` : 'LOGGED OUT');
            
            if (!user) {
                // Logged out: reset UI (PRESERVED)
                console.log('🔄 [Filter] User logged out, resetting');
                if (els.profileName) els.profileName.textContent = 'User';
                if (els.profileEmailSub) els.profileEmailSub.textContent = '';
                if (els.userEmail) els.userEmail.textContent = '';
                ['sd','smp','sma'].forEach(j => {
                    document.getElementById(`${j}-section`)?.classList.add('hidden');
                });
                return;
            }
            
            try {
                // Load from Firestore FIRST (source of truth)
                console.log('📡 [Filter] Loading user from Firestore...');
                const userData = await loadUserData(user.uid);
                
                if (!userData) {
                    console.warn('⚠️ [Filter] No user data, skipping filter');
                    return;
                }
                
                // Validate required field
                if (!userData.jenjang_sekolah) {
                    console.error('❌ [Filter] Missing field: jenjang_sekolah');
                    console.error('🔧 Fix: Add field "jenjang_sekolah" (string) to users/[uid] in Firestore');
                    return;
                }
                
                // ✅ APPLY FILTERING with fresh data
                applyFilter(userData);
                
                // Update localStorage as backup (for faster subsequent loads)
                localStorage.setItem('user_jenjang', userData.jenjang_sekolah || '');
                localStorage.setItem('user_kelas_diampu', JSON.stringify(userData.kelas_diampu || []));
                localStorage.setItem('user_role', userData.role || 'teacher');
                localStorage.setItem('user_sd_mapel_type', userData.sd_mapel_type || 'kelas');
                
                // Update profile display (PRESERVED)
                const nama = userData.nama_lengkap || 'User';
                const email = user.email || '';
                if (els.profileName) els.profileName.textContent = nama;
                if (els.profileEmailSub) els.profileEmailSub.textContent = email;
                if (els.userEmail) els.userEmail.textContent = email;
                if (els.userAvatar) {
                    els.userAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nama)}&background=7c3aed&color=fff`;
                }
                
            } catch (e) {
                console.error('❌ [Filter] Error in auth callback:', e);
                
                // Fallback: try localStorage if Firestore fails
                const cachedJenjang = localStorage.getItem('user_jenjang');
                if (cachedJenjang) {
                    console.log('🔄 [Filter] Fallback: using localStorage');
                    applyFilter({
                        jenjang_sekolah: cachedJenjang,
                        kelas_diampu: JSON.parse(localStorage.getItem('user_kelas_diampu') || '[]'),
                        role: localStorage.getItem('user_role') || 'teacher',
                        sd_mapel_type: localStorage.getItem('user_sd_mapel_type') || 'kelas'
                    });
                }
            }
        });
        
        console.log('🟢 [Dashboard Filter] Timing-Safe v3 READY');
    });
</script>
