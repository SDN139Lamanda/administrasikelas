<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - SDN 139 LAMANDA</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .active-menu {
            background-color: #2563eb;
            color: white;
        }
        .active-menu:hover {
            background-color: #1d4ed8;
        }
        
        /* Mobile Sidebar */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        
        /* Responsive Tables */
        @media (max-width: 768px) {
            main {
                padding: 1rem;
            }
            .overflow-x-auto {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            table {
                min-width: 600px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .px-6 {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
        
        /* Print Style untuk Absensi */
        @media print {
            aside, header, button {
                display: none !important;
            }
            #sidebarOverlay {
                display: none !important;
            }
            main {
                padding: 0 !important;
            }
            #absensiContent {
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- 🔐 FIREBASE AUTH PROTECTION -->
    <script type="module">
        import { auth } from './config-firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userName').textContent = user.email.split('@')[0];
                
                const avatarImg = document.getElementById('userAvatar');
                if (avatarImg) {
                    avatarImg.src = `https://ui-avatars.com/api/?name=${user.email.split('@')[0]}&background=0D8ABC&color=fff`;
                }
            }
        });
    </script>

    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR (Dengan Mobile Support) -->
        <aside id="sidebar" class="w-64 bg-slate-800 text-white flex flex-col fixed inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-50">
            <!-- Logo -->
            <div class="h-16 flex items-center justify-center border-b border-slate-700">
                <img src="logo-sekolah.jpeg" alt="Logo SDN 139 LAMANDA" class="h-8 w-8 mr-2 object-contain bg-white rounded-full p-1">
                <h1 class="text-xl font-bold">SDN 139 LAMANDA</h1>
            </div>

            <!-- Menu Navigasi -->
            <nav class="flex-1 px-2 py-4 space-y-2">
                <button onclick="loadModule('adm-kelas')" id="btn-kelas" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors active-menu">
                    <i class="fas fa-users w-6"></i>
                    <span>Adm. Kelas</span>
                </button>
                <button onclick="loadModule('adm-pembelajaran')" id="btn-pembelajaran" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-book-open w-6"></i>
                    <span>Adm. Pembelajaran</span>
                </button>
                <!-- ✨ Menu Asisten Modul -->
                <button onclick="loadModule('asisten-modul')" id="btn-asisten-modul" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-wand-magic-sparkles w-6"></i>
                    <span>Asisten Modul</span>
                </button>
                <button onclick="loadModule('refleksi')" id="btn-refleksi" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-mirror w-6"></i>
                    <span>Refleksi</span>
                </button>
                <button onclick="loadModule('penilaian')" id="btn-penilaian" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-slate-700 transition-colors">
                    <i class="fas fa-chart-line w-6"></i>
                    <span>Penilaian</span>
                </button>
            </nav>

            <!-- Footer Sidebar (Logout) -->
            <div class="p-4 border-t border-slate-700">
                <a href="#" id="logoutBtn" class="flex items-center w-full px-4 py-2 text-sm font-medium text-red-400 hover:text-red-300">
                    <i class="fas fa-sign-out-alt w-6"></i>
                    <span>Keluar</span>
                </a>
            </div>
        </aside>

        <!-- OVERLAY untuk mobile -->
        <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

        <!-- ✅ KONTEN UTAMA (DIPERBAIKI: TAMBAH md:ml-64 AGAR TIDAK TERTUTUP SIDEBAR DI LAPTOP) -->
        <div class="flex-1 flex flex-col overflow-hidden md:ml-64">
            
            <!-- Top Header -->
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6">
                <div class="flex items-center">
                    <!-- Hamburger Button (Mobile Only) -->
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-700 focus:outline-none mr-4">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800" id="page-title">Dashboard Overview</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium text-gray-900" id="userName">Loading...</p>
                        <p class="text-xs text-gray-500" id="userEmail">Loading...</p>
                    </div>
                    <img class="h-10 w-10 rounded-full object-cover border-2 border-blue-500" 
                         src="https://ui-avatars.com/api/?name=Guru&background=0D8ABC&color=fff" 
                         alt="Profile" id="userAvatar">
                </div>
            </header>

            <!-- Area Konten Dinamis (Module Container) -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                <div id="module-container" class="fade-in">
                    <!-- Konten module akan dimuat di sini -->
                </div>
            </main>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPT MOBILE SIDEBAR TOGGLE -->
    <!-- ============================================ -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                // Buka sidebar
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            } else {
                // Tutup sidebar
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-0');
                overlay.classList.add('hidden');
            }
        }

        // Tutup sidebar saat klik menu (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (window.innerWidth < 768 && e.target.closest('aside button')) {
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-0');
                overlay.classList.add('hidden');
            }
        });
    </script>

    <!-- ============================================ -->
    <!-- SCRIPT UTAMA DASHBOARD (Load Module) -->
    <!-- ============================================ -->
    <script>
        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            const titles = {
                'adm-kelas': 'Administrasi Kelas',
                'adm-pembelajaran': 'Administrasi Pembelajaran',
                'asisten-modul': 'Asisten Modul Ajar',
                'refleksi': 'Refleksi Pembelajaran',
                'penilaian': 'Penilaian & Laporan'
            };

            // Update judul halaman
            document.getElementById('page-title').innerText = titles[moduleName] || 'Dashboard';

            // Update active menu button
            document.querySelectorAll('aside button').forEach(btn => {
                btn.classList.remove('active-menu');
                btn.classList.add('hover:bg-slate-700');
            });

            // Handle active button highlight (support for multi-word module names)
            let activeBtn = null;
            if (moduleName === 'asisten-modul') {
                activeBtn = document.getElementById('btn-asisten-modul');
            } else {
                activeBtn = document.getElementById(`btn-${moduleName.split('-')[0]}`);
            }
            
            if (activeBtn) {
                activeBtn.classList.add('active-menu');
                activeBtn.classList.remove('hover:bg-slate-700');
            }

            // Tampilkan loading
            container.innerHTML = `
                <div class="text-center py-12">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                    <p class="text-gray-500">Memuat ${titles[moduleName]}...</p>
                </div>
            `;

            // Load module JavaScript
            try {
                const module = await import(`./modules/${moduleName}.js`);
                
                // Clear container dan render module
                container.innerHTML = '';
                if (module.render) {
                    container.appendChild(module.render());
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 text-red-500">
                            <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                            <p>Module tidak memiliki fungsi render()</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading module:', error);
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-exclamation-circle text-4xl text-red-500 mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-700 mb-2">Gagal Memuat Module</h3>
                        <p class="text-gray-500 mb-4">${error.message}</p>
                        <div class="bg-red-50 border border-red-200 rounded p-4 text-left inline-block">
                            <p class="text-sm text-red-700"><strong>Possible causes:</strong></p>
                            <ul class="text-sm text-red-600 list-disc list-inside">
                                <li>File modules/${moduleName}.js tidak ada</li>
                                <li>Path file salah (harus di folder modules/)</li>
                                <li>File belum di-commit ke GitHub</li>
                                <li>Cache browser (coba Hard Refresh Ctrl+F5)</li>
                            </ul>
                        </div>
                    </div>
                `;
            }
        }

        // Load default module saat halaman pertama kali dibuka
        document.addEventListener('DOMContentLoaded', () => {
            loadModule('adm-kelas');
        });
    </script>

    <!-- ============================================ -->
    <!-- SCRIPT LOGOUT (Firebase) -->
    <!-- ============================================ -->
    <script type="module">
        import { auth } from './config-firebase.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm('Apakah Anda yakin ingin keluar?')) {
                try {
                    await signOut(auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Logout error:', error);
                    alert('Gagal logout: ' + error.message);
                }
            }
        });
    </script>

</body>
</html>
