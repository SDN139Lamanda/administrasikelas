<!-- ✅ SOFT BLOCK: Show All, Block Unauthorized Clicks -->
<script type="module">
    import { auth, onAuthStateChanged, db, doc, getDoc } from './modules/firebase-config.js';
    
    console.log('🔴 [Dashboard Soft Block] START');
    
    // Wait for full page load
    window.addEventListener('load', async () => {
        console.log('✅ [Soft Block] Page loaded');
        
        // DOM Elements
        const els = {
            profileMenuBtn: document.getElementById('profileMenuBtn'),
            profileDropdown: document.getElementById('profileDropdown'),
            profileName: document.getElementById('profileName'),
            profileEmailSub: document.getElementById('profileEmailSub'),
            userEmail: document.getElementById('userEmail'),
            userAvatar: document.getElementById('userAvatar'),
            userContextBadge: document.getElementById('userContextBadge'),
            userContextText: document.getElementById('userContextText')
        };
        
        // Profile dropdown toggle (PRESERVED)
        if (els.profileMenuBtn && els.profileDropdown) {
            els.profileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                els.profileDropdown.classList.toggle('hidden');
            });
            document.addEventListener('click', (e) => {
                if (!els.profileDropdown?.contains(e.target) && !els.profileMenuBtn?.contains(e.target)) {
                    els.profileDropdown?.classList.add('hidden');
                }
            });
        }
        
        // ✅ Load user data from Firestore (PRESERVED)
        async function loadUserData(userId) {
            try {
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    console.log('✅ [Soft Block] User ', {
                        jenjang: data.jenjang_sekolah,
                        kelas_diampu: data.kelas_diampu,
                        role: data.role,
                        sd_mapel_type: data.sd_mapel_type
                    });
                    return data;
                }
                return null;
            } catch (e) {
                console.error('❌ [Soft Block] Error:', e);
                return null;
            }
        }
        
        // ✅ SOFT BLOCK: Intercept room card clicks
        function setupSoftBlock(userData) {
            if (!userData) return;
            
            const userJenjang = userData.jenjang_sekolah;
            const role = userData.role || 'teacher';
            
            console.log('🔒 [Soft Block] Setting up for jenjang:', userJenjang);
            
            // Add click interceptor to each room card
            document.querySelectorAll('.room-card[data-jenjang]').forEach(card => {
                const cardJenjang = card.getAttribute('data-jenjang');
                const link = card.querySelector('.room-link');
                
                if (!link) return;
                
                // Remove existing onclick to avoid double-trigger
                link.removeAttribute('onclick');
                
                // Add new click handler with soft block
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    console.log(`🖱️ [Soft Block] Clicked: ${cardJenjang}, User: ${userJenjang}`);
                    
                    // Admin can access all
                    if (role === 'admin') {
                        console.log('✅ [Soft Block] Admin access granted');
                        if (cardJenjang === 'sd') showSection('sd-section');
                        else if (cardJenjang === 'smp') showSection('smp-section');
                        else if (cardJenjang === 'sma') showSection('sma-section');
                        return;
                    }
                    
                    // Teacher: check if jenjang matches
                    if (cardJenjang === userJenjang) {
                        console.log(`✅ [Soft Block] Access granted: ${cardJenjang}`);
                        if (cardJenjang === 'sd') showSection('sd-section');
                        else if (cardJenjang === 'smp') showSection('smp-section');
                        else if (cardJenjang === 'sma') showSection('sma-section');
                    } else {
                        // BLOCK: Show friendly alert
                        console.log(`❌ [Soft Block] Access denied: ${cardJenjang} != ${userJenjang}`);
                        
                        const jenjangLabel = {sd:'SD', smp:'SMP', sma:'SMA'}[cardJenjang] || cardJenjang.toUpperCase();
                        alert(`⚠️ Akses Ditolak\n\nFitur ${jenjangLabel} hanya tersedia untuk guru ${jenjangLabel}.\n\nAnda terdaftar sebagai guru ${userJenjang?.toUpperCase()}.`);
                        
                        // Optional: Visual feedback
                        card.style.opacity = '0.6';
                        setTimeout(() => { card.style.opacity = '1'; }, 300);
                    }
                });
            });
            
            console.log('✅ [Soft Block] Click interceptors setup complete');
        }
        
        // ✅ Filter kelas cards inside sections (PRESERVED LOGIC)
        function filterKelasCards(userData) {
            if (!userData) return;
            
            const jenjang = userData.jenjang_sekolah;
            const kelasDiampu = userData.kelas_diampu || [];
            const sdMapelType = userData.sd_mapel_type || 'kelas';
            const role = userData.role || 'teacher';
            
            if (kelasDiampu.length === 0 || role !== 'teacher') return;
            
            console.log('🔍 [Soft Block] Filtering kelas cards:', { jenjang, kelasDiampu });
            
            // Only filter kelas cards in the matching jenjang section
            const section = document.getElementById(`${jenjang}-section`);
            if (!section) return;
            
            section.querySelectorAll('.kelas-card[data-kelas]').forEach(card => {
                const k = card.getAttribute('data-kelas');
                
                // SD Guru PAI/PJOK: show ALL classes
                if (jenjang === 'sd' && sdMapelType !== 'kelas') {
                    card.classList.remove('hidden');
                } else {
                    // Regular: show only assigned classes
                    if (kelasDiampu.includes(k)) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                }
            });
        }
        
        // ✅ Update context badge (PRESERVED)
        function updateContextBadge(userData) {
            if (!els.userContextBadge || !els.userContextText) return;
            
            const { jenjang_sekolah, role, sd_mapel_type } = userData;
            
            els.userContextBadge.classList.remove('hidden');
            if (role === 'admin') {
                els.userContextText.innerHTML = '<i class="fas fa-crown text-yellow-500 mr-1"></i> Admin';
            } else if (jenjang_sekolah) {
                const label = {sd:'SD', smp:'SMP', sma:'SMA'}[jenjang_sekolah] || jenjang_sekolah.toUpperCase();
                const extra = (jenjang_sekolah==='sd' && sd_mapel_type!=='kelas') ? ` • ${sd_mapel_type.toUpperCase()}` : '';
                els.userContextText.textContent = `Guru ${label}${extra}`;
            }
        }
        
        // ✅ Main: Auth state listener
        onAuthStateChanged(auth, async (user) => {
            console.log('🔐 [Soft Block] Auth:', user ? `IN (${user.uid})` : 'OUT');
            
            if (!user) return;
            
            try {
                // Load user data from Firestore
                const userData = await loadUserData(user.uid);
                if (!userData) return;
                
                // Validate required field
                if (!userData.jenjang_sekolah) {
                    console.error('❌ [Soft Block] Missing field: jenjang_sekolah');
                    return;
                }
                
                // ✅ SETUP SOFT BLOCK (intercept clicks)
                setupSoftBlock(userData);
                
                // ✅ Filter kelas cards inside sections
                filterKelasCards(userData);
                
                // ✅ Update context badge
                updateContextBadge(userData);
                
                // ✅ Update profile display
                const nama = userData.nama_lengkap || 'User';
                const email = user.email || '';
                if (els.profileName) els.profileName.textContent = nama;
                if (els.profileEmailSub) els.profileEmailSub.textContent = email;
                if (els.userEmail) els.userEmail.textContent = email;
                if (els.userAvatar) {
                    els.userAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nama)}&background=7c3aed&color=fff`;
                }
                
                // ✅ Save to localStorage for faster loads
                localStorage.setItem('user_jenjang', userData.jenjang_sekolah || '');
                localStorage.setItem('user_kelas_diampu', JSON.stringify(userData.kelas_diampu || []));
                
                console.log('🎉 [Soft Block] Setup complete!');
                
            } catch (e) {
                console.error('❌ [Soft Block] Error:', e);
            }
        });
        
        console.log('🟢 [Dashboard Soft Block] READY');
    });
</script>
