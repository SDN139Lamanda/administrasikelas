<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SDN 139 Lamanda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: white; padding: 30px; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
    }
    .card h2 { text-align: center; margin-bottom: 20px; color: #1e293b; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #334155; }
    .form-group input {
      width: 100%; padding: 12px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: 1rem;
    }
    .form-group input:focus {
      outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
    }
    .btn {
      width: 100%; padding: 12px; background: #667eea; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .btn:hover { background: #556cd6; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .alert {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
      font-size: 0.9rem; display: none;
    }
    .alert.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .alert.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 0.9rem; }
    .footer a { color: #667eea; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Masuk</h2>
    
    <div id="alert" class="alert"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="contoh@sdn139.sch.id" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn" id="btnSubmit">Masuk</button>
    </form>
    
    <div class="footer">
      Belum punya akun? <a href="register.html">Daftar disini</a>
    </div>
  </div>

  <script type="module">
    // 🔗 Import dari config-firebase.js yang sudah kita upload
    import { auth } from './config-firebase.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert');
    const btnSubmit = document.getElementById('btnSubmit');

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert ${type}`;
      alertBox.style.display = 'block';
      setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      // UI Loading
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Memproses...';
      alertBox.style.display = 'none';

      try {
        // 🔐 Proses login dengan Firebase
        await signInWithEmailAndPassword(auth, email, password);
        
        showAlert('✅ Login berhasil! Mengalihkan...', 'success');
        
        // 🎯 Redirect ke dashboard setelah 800ms
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
        
      } catch (error) {
        console.error('Login error:', error);
        
        let message = 'Login gagal. Silakan coba lagi.';
        
        // Pesan error yang lebih ramah
        switch (error.code) {
          case 'auth/user-not-found':
            message = 'Email tidak terdaftar.';
            break;
          case 'auth/wrong-password':
            message = 'Password salah.';
            break;
          case 'auth/invalid-email':
            message = 'Format email tidak valid.';
            break;
          case 'auth/too-many-requests':
            message = 'Terlalu banyak percobaan. Coba lagi nanti.';
            break;
        }
        
        showAlert(message, 'error');
        
        // Kembalikan tombol
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
