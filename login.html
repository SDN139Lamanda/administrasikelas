<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SDN 139 LAMANDA</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #1e293b;
      --muted: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-box {
      background: var(--white);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: white;
      font-size: 1.8rem;
    }
    
    .login-header h2 {
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .login-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text);
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }
    
    .form-control {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
    }
    
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:disabled { background: var(--muted); cursor: not-allowed; }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }
    
    .alert-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }
    
    .alert-success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }
    
    .alert.show { display: block; }
    
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }
    
    .back-link:hover { color: rgba(255,255,255,0.8); }
    
    /* ✅ TAMBAHAN: Link Helper Styles */
    .login-links {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }
    
    .login-links a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin: 0 0.5rem;
      transition: color 0.2s;
    }
    
    .login-links a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .login-links .separator {
      color: var(--muted);
      margin: 0 0.25rem;
    }
    
    @media (max-width: 480px) {
      .login-box { padding: 2rem 1.5rem; }
      .back-link { position: static; margin-bottom: 1rem; justify-content: center; }
      .login-links { flex-direction: column; gap: 0.5rem; }
      .login-links .separator { display: none; }
    }
  </style>
</head>
<body>

  <!-- Back to Home -->
  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i>
    <span>Kembali ke Beranda</span>
  </a>

  <!-- Login Box -->
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">
        <i class="fas fa-mortar-board"></i>
      </div>
      <h2>Selamat Datang</h2>
      <p>Silakan login untuk mengakses sistem</p>
    </div>

    <div id="errorAlert" class="alert alert-error"></div>
    <div id="successAlert" class="alert alert-success"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            placeholder="guru@guru.sd.belajar.id" 
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            class="form-control" 
            id="password" 
            placeholder="••••••••" 
            required 
            minlength="6"
          >
          <button type="button" class="toggle-pw" id="togglePw">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtnSubmit">
        <span id="btnText">Masuk</span>
        <span id="spinner" class="spinner" style="display:none;"></span>
      </button>
    </form>

    <!-- ✅ TAMBAHAN: Link Register & Forgot Password -->
    <div class="login-links">
      <a href="register.html">Daftar Akun</a>
      <span class="separator">•</span>
      <a href="reset-password.html">Lupa Password?</a>
    </div>

    <p style="text-align: center; margin-top: 1rem; color: var(--muted); font-size: 0.85rem;">
      <i class="fas fa-info-circle"></i> Gunakan email @guru.sd.belajar.id
    </p>
  </div>

  <!-- Firebase + App Logic -->
  <script type="module">
    import {
      auth,
      signInWithEmailAndPassword,
      signOut
    } from './config-firebase.js';

    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtnSubmit');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');
    const togglePw = document.getElementById('togglePw');

    // Toggle Password
    togglePw.addEventListener('click', function() {
      const pw = passwordInput;
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Login Form Handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Reset UI
      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');
      loginBtn.disabled = true;
      btnText.textContent = 'Memproses...';
      spinner.style.display = 'inline-block';
      
      try {
        // 1. Login dengan Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // 2. Tentukan role dari email pattern
        const role = determineRoleFromEmail(email);
        
        // 3. Simpan ke session
        sessionStorage.setItem('currentUser', JSON.stringify({
          uid: user.uid,
          email: user.email,
          name: user.email.split('@')[0],
          role: role
        }));
        
        // 4. Sukses & redirect
        successAlert.textContent = 'Login berhasil! Mengalihkan...';
        successAlert.classList.add('show');
        
        setTimeout(() => {
          if (role === 'guru') {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'dashboard-siswa.html';
          }
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        errorAlert.textContent = getErrorMessage(error.code || error.message);
        errorAlert.classList.add('show');
        
        loginBtn.disabled = false;
        btnText.textContent = 'Masuk';
        spinner.style.display = 'none';
      }
    });

    // Helper: Role dari Email
    function determineRoleFromEmail(email) {
      const emailLower = email.toLowerCase();
      if (emailLower.includes('guru') || emailLower.includes('admin')) {
        return 'guru';
      } else if (emailLower.includes('siswa') || emailLower.includes('parent')) {
        return 'siswa';
      } else {
        return 'guru'; // default
      }
    }

    // Helper: Error Message
    function getErrorMessage(code) {
      const messages = {
        'auth/invalid-email': 'Format email tidak valid.',
        'auth/user-not-found': 'Email tidak terdaftar.',
        'auth/wrong-password': 'Password salah.',
        'auth/too-many-requests': 'Terlalu banyak percobaan. Silakan tunggu.'
      };
      return messages[code] || 'Login gagal. Silakan coba lagi.';
    }
  </script>

</body>
</html>
