<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SDN 139 LAMANDA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-dark: #1d4ed8; --text: #1e293b; --muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: white; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px; padding: 2.5rem;
        }
        .logo {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; color: white; font-size: 1.8rem;
        }
        h2 { text-align: center; margin-bottom: 0.5rem; color: var(--text); }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text); }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--muted);
        }
        .form-control {
            width: 100%; padding: 12px 14px 12px 42px;
            border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem;
        }
        .form-control:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .toggle-pw {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); background: none;
            border: none; color: var(--muted); cursor: pointer;
        }
        .btn-login {
            width: 100%; padding: 12px;
            background: var(--primary); color: white;
            border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover { background: var(--primary-dark); }
        .btn-login:disabled { background: var(--muted); cursor: not-allowed; }
        .alert {
            padding: 12px; border-radius: 8px; margin-bottom: 1rem;
            display: none; font-size: 0.9rem;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .alert.show { display: block; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }
        .debug-info {
            margin-top: 1rem; padding: 10px;
            background: #f1f5f9; border-radius: 8px;
            font-size: 0.75rem; color: var(--muted);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Kembali
    </a>

    <div class="login-box">
        <div class="logo"><i class="fas fa-mortar-board"></i></div>
        <h2>Login</h2>
        <p class="subtitle">Sistem Administrasi Kelas</p>

        <div id="errorAlert" class="alert alert-error"></div>
        <div id="successAlert" class="alert alert-success"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" placeholder="guru@sekolah.sch.id" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
                    <button type="button" class="toggle-pw" id="togglePw"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Masuk</span>
                <span id="spinner" class="spinner" style="display:none;"></span>
            </button>
        </form>

        <div class="debug-info">
            <strong>Status:</strong>
            <div id="debugStatus">Initializing...</div>
            <div id="debugUser" style="margin-top:5px;"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDK (Direct CDN - No Module Import) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <!-- App Logic -->
    <script>
        // === DEBUG STATUS ===
        const debugStatus = document.getElementById('debugStatus');
        const debugUser = document.getElementById('debugUser');
        
        console.log('🔍 Initializing Firebase...');
        debugStatus.textContent = 'Loading Firebase SDK...';

        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyCYoUcSKj8aAZTaNgKtrn0bYHPmedVHAE4",
            authDomain: "sdn139lamanda-a67a8.firebaseapp.com",
            databaseURL: "https://sdn139lamanda-a67a8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sdn139lamanda-a67a8",
            storageBucket: "sdn139lamanda-a67a8.firebasestorage.app",
            messagingSenderId: "520862158793",
            appId: "1:520862158793:web:c8cb5a4259d5e54ea06218",
            measurementId: "G-S012NQH5LS"
        };

        // === INITIALIZE FIREBASE ===
        try {
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const database = firebase.database();
            
            console.log('✅ Firebase initialized');
            debugStatus.textContent = '✅ Firebase Ready';
            
            // === CHECK EXISTING SESSION ===
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ User logged in:', user.email);
                    debugStatus.textContent = '✅ User: ' + user.email;
                    
                    // Get user role from database
                    database.ref('users/' + user.uid).once('value')
                        .then(snapshot => {
                            if (snapshot.exists()) {
                                const userData = snapshot.val();
                                debugUser.textContent = 'Role: ' + userData.role;
                                
                                // Redirect to dashboard
                                showSuccess('Sesi aktif. Mengalihkan...');
                                setTimeout(() => {
                                    window.location.href = userData.role === 'guru' ? 'dashboard-guru.html' : 'dashboard-siswa.html';
                                }, 1000);
                            }
                        })
                        .catch(err => console.error('Error fetching user:', err));
                } else {
                    console.log('⚪ No user logged in');
                    debugStatus.textContent = '⚪ Siap login';
                }
            });

            // === TOGGLE PASSWORD ===
            document.getElementById('togglePw').addEventListener('click', function() {
                const pw = document.getElementById('password');
                const icon = this.querySelector('i');
                if (pw.type === 'password') {
                    pw.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    pw.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });

            // === LOGIN FORM HANDLER ===
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                console.log('🔹 Form submitted');
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                const btnText = document.getElementById('btnText');
                const spinner = document.getElementById('spinner');
                const errorAlert = document.getElementById('errorAlert');
                const successAlert = document.getElementById('successAlert');
                
                // Reset alerts
                errorAlert.classList.remove('show');
                successAlert.classList.remove('show');
                
                // Set loading state
                loginBtn.disabled = true;
                btnText.textContent = 'Memproses...';
                spinner.style.display = 'inline-block';
                
                console.log('🔹 Attempting login for:', email);
                
                // === FIREBASE LOGIN ===
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        console.log('✅ Login success:', userCredential.user.email);
                        
                        // Get user role from database
                        return database.ref('users/' + userCredential.user.uid).once('value')
                            .then(snapshot => {
                                if (!snapshot.exists()) {
                                    throw new Error('Data pengguna tidak ditemukan');
                                }
                                return snapshot.val();
                            })
                            .then(userData => {
                                // Save to session
                                sessionStorage.setItem('currentUser', JSON.stringify({
                                    uid: userCredential.user.uid,
                                    email: userData.email,
                                    name: userData.name,
                                    role: userData.role
                                }));
                                
                                // Show success & redirect
                                showSuccess('Login berhasil! Mengalihkan...');
                                setTimeout(() => {
                                    window.location.href = userData.role === 'guru' ? 'dashboard-guru.html' : 'dashboard-siswa.html';
                                }, 1000);
                            });
                    })
                    .catch((error) => {
                        console.error('❌ Login error:', error.code, error.message);
                        showError(getErrorMessage(error.code));
                        loginBtn.disabled = false;
                        btnText.textContent = 'Masuk';
                        spinner.style.display = 'none';
                    });
            });

            // === HELPER FUNCTIONS ===
            function showError(msg) {
                const alert = document.getElementById('errorAlert');
                alert.textContent = msg;
                alert.classList.add('show');
            }

            function showSuccess(msg) {
                const alert = document.getElementById('successAlert');
                alert.textContent = msg;
                alert.classList.add('show');
            }

            function getErrorMessage(code) {
                const messages = {
                    'auth/invalid-email': 'Format email tidak valid.',
                    'auth/user-disabled': 'Akun ini telah dinonaktifkan.',
                    'auth/user-not-found': 'Email tidak terdaftar.',
                    'auth/wrong-password': 'Password salah.',
                    'auth/too-many-requests': 'Terlalu banyak percobaan. Silakan tunggu.'
                };
                return messages[code] || 'Login gagal: ' + code;
            }

        } catch (e) {
            console.error('❌ Firebase init error:', e);
            debugStatus.textContent = '❌ Error: ' + e.message;
        }
    </script>
</body>
</html>
