<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Platform Guru SD/SMP/SMA</title>
    <meta name="description" content="Daftar akun baru untuk Platform Administrasi Kelas Digital">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .register-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid #7c3aed;
        }
        .register-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 4px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .register-input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .register-input.error {
            border-color: #ef4444;
        }
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .error-text.visible {
            display: block;
        }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #0891b2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,58,237,0.3);
        }
        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
            line-height: 1.5;
        }
        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            display: block;
        }
        .message.warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
            display: block;
        }
        .password-strength {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-fill {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
        .debug-info {
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: #6b7280;
            margin-top: 8px;
            font-family: monospace;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="register-card">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-purple-100 rounded-full mb-4">
                <i class="fas fa-user-plus text-purple-600 text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Daftar Akun Baru</h1>
            <p class="text-gray-600 mt-2">Lengkapi form di bawah untuk membuat akun</p>
        </div>
        
        <!-- Message Display -->
        <div id="message" class="message" role="alert" aria-live="polite"></div>
        
        <!-- Form -->
        <form id="registerForm">
            <!-- Nama Lengkap -->
            <div class="mb-4">
                <label for="namaLengkap" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2"></i>Nama Lengkap <span class="text-red-500">*</span>
                </label>
                <input type="text" id="namaLengkap" class="register-input" placeholder="Contoh: Siti Rahayu, S.Pd" required autocomplete="name">
            </div>
            
            <!-- Email -->
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-envelope mr-2"></i>Email <span class="text-red-500">*</span>
                </label>
                <input type="email" id="email" class="register-input" placeholder="nama@sekolah.sch.id" required autocomplete="email">
                <p class="error-text" id="emailError">Format email tidak valid</p>
            </div>
            
            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>Password <span class="text-red-500">*</span>
                </label>
                <input type="password" id="password" class="register-input" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password">
                <div class="password-strength">
                    <div id="passwordStrength" class="password-strength-fill"></div>
                </div>
                <p class="error-text" id="passwordError">Password minimal 6 karakter</p>
                <p class="text-xs text-gray-500 mt-1">
                    <i class="fas fa-info-circle mr-1"></i>Gunakan kombinasi huruf dan angka untuk keamanan
                </p>
            </div>
            
            <!-- Konfirmasi Password -->
            <div class="mb-4">
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>Konfirmasi Password <span class="text-red-500">*</span>
                </label>
                <input type="password" id="confirmPassword" class="register-input" placeholder="Ulangi password" required minlength="6" autocomplete="new-password">
                <p class="error-text" id="confirmError">Password tidak sama</p>
            </div>
            
            <!-- Jenjang -->
            <div class="mb-4">
                <label for="jenjang" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-layer-group mr-2"></i>Jenjang <span class="text-red-500">*</span>
                </label>
                <select id="jenjang" class="register-input" required>
                    <option value="">Pilih Jenjang</option>
                    <option value="sd">SD (Sekolah Dasar)</option>
                    <option value="smp">SMP (Sekolah Menengah Pertama)</option>
                    <option value="sma">SMA (Sekolah Menengah Atas)</option>
                </select>
            </div>
            
            <!-- Nama Sekolah -->
            <div class="mb-4">
                <label for="namaSekolah" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-school mr-2"></i>Nama Sekolah <span class="text-red-500">*</span>
                </label>
                <input type="text" id="namaSekolah" class="register-input" placeholder="Contoh: SDN 139 Lamanda" required>
            </div>
            
            <!-- Nomor HP (Optional) -->
            <div class="mb-6">
                <label for="noHp" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-phone mr-2"></i>Nomor HP <span class="text-gray-400">(Opsional)</span>
                </label>
                <input type="tel" id="noHp" class="register-input" placeholder="081234567890">
            </div>
            
            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="register-btn">
                <i class="fas fa-user-plus"></i>
                <span id="btnText">Daftar Sekarang</span>
                <i id="loadingIcon" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>
        
        <!-- Login Link -->
        <div class="text-center mt-6">
            <p class="text-gray-600 text-sm">Sudah punya akun?</p>
            <a href="login.html" class="inline-block mt-2 text-purple-600 hover:text-purple-500 font-medium">
                <i class="fas fa-sign-in-alt mr-2"></i>Login di sini
            </a>
        </div>
        
        <!-- Back Link -->
        <a href="index.html" class="back-link inline-flex items-center gap-2 text-gray-600 hover:text-purple-600 mt-6 text-sm">
            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
        </a>
        
        <!-- Debug Info (Hidden by default, show via console) -->
        <div id="debugInfo" class="debug-info hidden"></div>
    </div>

    <!-- Firebase + Logic Script -->
    <script type="module">
        import { 
            auth,
            db,
            createUserWithEmailAndPassword,
            sendEmailVerification,
            updateProfile,
            collection,
            doc,
            setDoc,
            serverTimestamp
        } from './modules/firebase-config.js';
        
        console.log('🔴 [Register] Script START');
        console.log('🔴 [Register] Firebase SDK version: 9.22.0');
        
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const debugInfo = document.getElementById('debugInfo');
        
        // Form fields
        const namaLengkapInput = document.getElementById('namaLengkap');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const jenjangSelect = document.getElementById('jenjang');
        const namaSekolahInput = document.getElementById('namaSekolah');
        const noHpInput = document.getElementById('noHp');
        
        // Error elements
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');
        const passwordStrength = document.getElementById('passwordStrength');
        
        // ✅ Show message helper
        function showMessage(text, type = 'success') {
            messageDiv.innerHTML = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 8000);
            }
        }
        
        // ✅ Set loading state
        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.textContent = loading ? 'Mendaftar...' : 'Daftar Sekarang';
            loadingIcon.classList.toggle('hidden', !loading);
        }
        
        // ✅ Show field error
        function showFieldError(element, errorElement, show) {
            if (show) {
                element.classList.add('error');
                errorElement.classList.add('visible');
            } else {
                element.classList.remove('error');
                errorElement.classList.remove('visible');
            }
        }
        
        // ✅ Check password strength
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            passwordStrength.className = 'password-strength-fill';
            if (strength <= 2) {
                passwordStrength.classList.add('strength-weak');
            } else if (strength <= 4) {
                passwordStrength.classList.add('strength-medium');
            } else {
                passwordStrength.classList.add('strength-strong');
            }
            return strength;
        }
        
        // ✅ Real-time validation
        passwordInput.addEventListener('input', () => {
            checkPasswordStrength(passwordInput.value);
            showFieldError(passwordInput, passwordError, passwordInput.value.length > 0 && passwordInput.value.length < 6);
        });
        
        confirmPasswordInput.addEventListener('input', () => {
            showFieldError(confirmPasswordInput, confirmError, 
                confirmPasswordInput.value.length > 0 && 
                passwordInput.value !== confirmPasswordInput.value);
        });
        
        // ✅ FIX 2: Email validation - only show error if user typed something AND it's invalid
        emailInput.addEventListener('input', () => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const value = emailInput.value.trim();
            const shouldShowError = value.length > 0 && !emailRegex.test(value);
            showFieldError(emailInput, emailError, shouldShowError);
        });
        
        // ✅ DEBUG HELPER: Expose to window for console testing
        window.debugRegister = {
            auth,
            db,
            createUserWithEmailAndPassword,
            sendEmailVerification,
            testSendEmail: async (email) => {
                try {
                    console.log('🧪 [Debug] Testing email send for:', email);
                    const testPass = 'Test123!' + Date.now();
                    const cred = await createUserWithEmailAndPassword(auth, email, testPass);
                    await sendEmailVerification(cred.user);
                    console.log('✅ [Debug] Test email sent!');
                    return { success: true, uid: cred.user.uid };
                } catch (e) {
                    console.error('❌ [Debug] Test failed:', e.code, e.message);
                    return { success: false, error: e };
                }
            }
        };
        console.log('💡 [Register] Debug helper available: window.debugRegister');
        
        // ✅ Handle form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            showMessage('', 'success');
            
            // ✅ FIX 1: Clear all field errors BEFORE new validation
            showFieldError(emailInput, emailError, false);
            showFieldError(passwordInput, passwordError, false);
            showFieldError(confirmPasswordInput, confirmError, false);
            
            const namaLengkap = namaLengkapInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const jenjang = jenjangSelect.value;
            const namaSekolah = namaSekolahInput.value.trim();
            const noHp = noHpInput.value.trim();
            
            // ✅ Validate
            let hasError = false;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) { showFieldError(emailInput, emailError, true); hasError = true; }
            if (password.length < 6) { showFieldError(passwordInput, passwordError, true); hasError = true; }
            if (password !== confirmPassword) { showFieldError(confirmPasswordInput, confirmError, true); hasError = true; }
            
            if (hasError) {
                showMessage('❌ Mohon perbaiki error di atas sebelum mendaftar.', 'error');
                return;
            }
            
            setLoading(true);
            
            try {
                console.log('═══════════════════════════════════');
                console.log('📝 [Register] Starting registration for:', email);
                console.log('═══════════════════════════════════');
                
                // ✅ Step 1: Create Firebase Auth user
                console.log('🔐 [Register] Step 1: Creating Auth account...');
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                console.log('✅ [Register] Auth account created:', user.uid);
                console.log('✅ [Register] Email:', user.email);
                console.log('✅ [Register] emailVerified:', user.emailVerified);
                
                // ✅ Step 2: Update profile
                console.log('👤 [Register] Step 2: Updating profile...');
                await updateProfile(user, { displayName: namaLengkap });
                console.log('✅ [Register] Profile updated:', namaLengkap);
                
                // ✅ Step 3: Send email verification (WITH SEPARATE ERROR HANDLING)
                console.log('📧 [Register] Step 3: Attempting to send verification email...');
                let emailSent = false;
                let emailError = null;
                
                try {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    console.log('📧 [Register] Calling sendEmailVerification...');
                    console.log('📧 [Register] User object:', {
                        uid: user.uid,
                        email: user.email,
                        emailVerified: user.emailVerified,
                        metadata: user.metadata
                    });
                    
                    await sendEmailVerification(user);
                    
                    console.log('✅ [Register] ✅✅✅ sendEmailVerification SUCCESS! ✅✅✅');
                    console.log('✅ [Register] Email should arrive at:', user.email);
                    console.log('✅ [Register] Check: Inbox, Spam, Promotions, Updates folders');
                    emailSent = true;
                    
                } catch (err) {
                    console.error('❌ [Register] ❌❌❌ sendEmailVerification FAILED! ❌❌❌');
                    console.error('❌ [Register] Error code:', err.code);
                    console.error('❌ [Register] Error message:', err.message);
                    console.error('❌ [Register] Full error:', JSON.stringify(err, Object.getOwnPropertyNames(err), 2));
                    emailError = err;
                    emailSent = false;
                }
                
                // ✅ Step 4: Create Firestore document (ALWAYS runs, even if email fails)
                console.log('📦 [Register] Step 4: Creating Firestore document...');
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    nama_lengkap: namaLengkap,
                    nama_sekolah: namaSekolah,
                    jenjang_sekolah: jenjang,
                    no_hp: noHp || '',
                    role: 'teacher',
                    kelas_diampu: [],
                    isActive: true,
                    isApproved: false,
                    isEmailVerified: user.emailVerified,
                    emailSendStatus: emailSent ? 'sent' : 'failed',
                    emailSendError: emailError ? { code: emailError.code, message: emailError.message } : null,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    lastLogin: serverTimestamp()
                });
                console.log('✅ [Register] Firestore document created');
                
                // ✅ Step 5: Show success message (with email status)
                let successMsg = `✅ <strong>Pendaftaran berhasil!</strong><br><br>`;
                
                if (emailSent) {
                    successMsg += `📧 Email verifikasi telah dikirim ke <strong>${email}</strong>.<br><br>
                    <strong>Langkah selanjutnya:</strong><br>
                    1️⃣ Buka email inbox Anda<br>
                    2️⃣ Cek folder <strong>Spam</strong>, <strong>Promotions</strong>, atau <strong>Updates</strong><br>
                    3️⃣ Cari email dari <strong>noreply@firebaseapp.com</strong><br>
                    4️⃣ Klik link <strong>"Verify email"</strong><br>
                    5️⃣ Login dengan password Anda<br>
                    6️⃣ Tunggu persetujuan admin (1-3 hari kerja)<br><br>
                    <small class="text-gray-500">⏰ Link verifikasi berlaku 1 jam. Jika expired, hubungi admin.</small>`;
                } else {
                    successMsg += `⚠️ <strong>Catatan:</strong> Email verifikasi <em>gagal terkirim</em>.<br><br>
                    <strong>Akun Anda tetap dibuat</strong> dan bisa digunakan setelah admin memverifikasi manual.<br><br>
                    <strong>Yang perlu dilakukan:</strong><br>
                    1️⃣ Hubungi admin via: radiah.tifarahs@gmail.com<br>
                    2️⃣ Sertakan email: <strong>${email}</strong><br>
                    3️⃣ Admin akan verifikasi manual<br><br>
                    <small class="text-gray-500">💡 Penyebab umum: domain tidak authorized, quota email habis, atau delay Firebase.</small>`;
                }
                
                showMessage(successMsg, 'success');
                
                // ✅ Show debug info if email failed
                if (!emailSent && debugInfo) {
                    debugInfo.classList.remove('hidden');
                    debugInfo.innerHTML = `
                        <strong>Debug Info:</strong><br>
                        Error Code: ${emailError?.code || 'N/A'}<br>
                        Error Message: ${emailError?.message || 'N/A'}<br>
                        Timestamp: ${new Date().toLocaleString('id-ID')}
                    `;
                }
                
                // ✅ Reset form
                form.reset();
                passwordStrength.className = 'password-strength-fill';
                
                // ✅ Redirect after 8 seconds
                setTimeout(() => {
                    window.location.href = 'login.html?registered=true&emailSent=' + emailSent;
                }, 8000);
                
                console.log('🎉 [Register] Registration flow completed');
                console.log('═══════════════════════════════════');
                
            } catch (error) {
                console.error('❌ [Register] MAIN CATCH - Critical error:', error);
                console.error('❌ [Register] Error code:', error.code);
                console.error('❌ [Register] Error message:', error.message);
                
                let errorMessage = '❌ <strong>Gagal mendaftar.</strong><br><br>';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage += 'Email sudah terdaftar. Silakan login atau gunakan email lain.';
                    showFieldError(emailInput, emailError, true);
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage += 'Format email tidak valid.';
                    showFieldError(emailInput, emailError, true);
                } else if (error.code === 'auth/weak-password') {
                    errorMessage += 'Password terlalu lemah. Gunakan minimal 6 karakter dengan kombinasi huruf dan angka.';
                    showFieldError(passwordInput, passwordError, true);
                } else if (error.code === 'auth/operation-not-allowed') {
                    errorMessage += 'Pendaftaran sedang ditutup. Hubungi admin.';
                } else if (error.code === 'firestore/unavailable') {
                    errorMessage += 'Database tidak tersedia. Coba lagi nanti.';
                } else if (error.code === 'network-request-failed') {
                    errorMessage += 'Koneksi internet bermasalah. Cek koneksi Anda.';
                } else {
                    errorMessage += `Error: ${error.message || 'Silakan coba lagi nanti.'}`;
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        });
        
        console.log('🟢 [Register] READY — Debug: window.debugRegister');
    </script>
</body>
</html>
