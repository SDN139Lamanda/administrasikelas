<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - BrandSaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #64748b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e293b;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .form-group.error input {
            border-color: #ef4444;
        }

        .form-group.error .error-message {
            display: block;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background: #1d4ed8;
        }

        .btn-register:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #64748b;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e2e8f0;
            z-index: -1;
        }

        .divider span {
            background: white;
            padding: 0 10px;
        }

        .social-register {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .social-btn {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
        }

        .login-link a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .strength-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            width: auto;
            margin-top: 3px;
        }

        .checkbox-group label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 400;
        }

        .checkbox-group a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-container">
            <div class="register-header">
                <h1><i class="fas fa-user-plus" style="color: #2563eb;"></i> Buat Akun</h1>
                <p>Daftar untuk mulai menggunakan layanan kami</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="registerForm">
                <div class="form-group" id="nameGroup">
                    <label for="fullName">Nama Lengkap</label>
                    <input type="text" id="fullName" placeholder="Masukkan nama lengkap" required>
                    <span class="error-message">Nama lengkap harus diisi</span>
                </div>

                <div class="form-group" id="emailGroup">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                    <span class="error-message">Format email tidak valid</span>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span id="strengthText" style="color: #64748b; margin-top: 5px; display: block;"></span>
                    </div>
                    <span class="error-message">Password minimal 6 karakter</span>
                </div>

                <div class="form-group" id="confirmPasswordGroup">
                    <label for="confirmPassword">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
                    <span class="error-message">Password tidak cocok</span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Saya setuju dengan <a href="#" target="_blank">Syarat & Ketentuan</a> 
                        dan <a href="#" target="_blank">Kebijakan Privasi</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    Daftar Sekarang
                </button>
            </form>

            <div class="divider">
                <span>atau daftar dengan</span>
            </div>

            <div class="social-register">
                <button class="social-btn" id="googleRegister">
                    <i class="fab fa-google" style="color: #DB4437;"></i> Google
                </button>
                <button class="social-btn" id="githubRegister">
                    <i class="fab fa-github"></i> GitHub
                </button>
            </div>

            <div class="login-link">
                Sudah punya akun? <a href="login.html">Masuk disini</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './config-firebase.js';
        import { 
            createUserWithEmailAndPassword, 
            updateProfile,
            signInWithPopup,
            GoogleAuthProvider,
            GithubAuthProvider
        } from "firebase/auth";
        import { doc, setDoc } from "firebase/firestore";

        // DOM Elements
        const registerForm = document.getElementById('registerForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Password Strength Checker
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            strengthFill.className = 'strength-fill';
            if (strength <= 2) {
                strengthFill.classList.add('strength-weak');
                strengthText.textContent = 'Kekuatan: Lemah';
                strengthText.style.color = '#ef4444';
            } else if (strength <= 4) {
                strengthFill.classList.add('strength-medium');
                strengthText.textContent = 'Kekuatan: Sedang';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthFill.classList.add('strength-strong');
                strengthText.textContent = 'Kekuatan: Kuat';
                strengthText.style.color = '#10b981';
            }
        });

        // Show Alert
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        // Validate Form
        function validateForm() {
            let isValid = true;

            // Nama
            if (fullNameInput.value.trim().length < 3) {
                document.getElementById('nameGroup').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('nameGroup').classList.remove('error');
            }

            // Email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value)) {
                document.getElementById('emailGroup').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('emailGroup').classList.remove('error');
            }

            // Password
            if (passwordInput.value.length < 6) {
                document.getElementById('passwordGroup').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('passwordGroup').classList.remove('error');
            }

            // Confirm Password
            if (passwordInput.value !== confirmPasswordInput.value) {
                document.getElementById('confirmPasswordGroup').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('confirmPasswordGroup').classList.remove('error');
            }

            return isValid;
        }

        // Remove error on input
        [fullNameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => {
            input.addEventListener('input', () => {
                input.parentElement.classList.remove('error');
            });
        });

        // Register with Email & Password
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                showAlert('Mohon periksa kembali form Anda', 'error');
                return;
            }

            if (!document.getElementById('terms').checked) {
                showAlert('Anda harus menyetujui syarat & ketentuan', 'error');
                return;
            }

            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Memproses...';

            try {
                // Create user with Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Update profile with full name
                await updateProfile(user, {
                    displayName: fullName
                });

                // Save additional user data to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    createdAt: new Date().toISOString(),
                    uid: user.uid
                });

                showAlert('Registrasi berhasil! Mengalihkan...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                
                let errorMessage = 'Registrasi gagal. Silakan coba lagi.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Email sudah terdaftar. Silakan login.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Format email tidak valid.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password terlalu lemah. Minimal 6 karakter.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Registrasi email/password tidak diaktifkan.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showAlert(errorMessage, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Daftar Sekarang';
            }
        });

        // Google Register
        document.getElementById('googleRegister').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Save user data to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    provider: 'google',
                    createdAt: new Date().toISOString(),
                    uid: user.uid
                }, { merge: true });

                showAlert('Login dengan Google berhasil!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('Google sign in error:', error);
                showAlert('Login Google gagal: ' + error.message, 'error');
            }
        });

        // GitHub Register
        document.getElementById('githubRegister').addEventListener('click', async () => {
            const provider = new GithubAuthProvider();
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    provider: 'github',
                    createdAt: new Date().toISOString(),
                    uid: user.uid
                }, { merge: true });

                showAlert('Login dengan GitHub berhasil!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('GitHub sign in error:', error);
                showAlert('Login GitHub gagal: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
