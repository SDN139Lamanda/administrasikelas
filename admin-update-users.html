<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Update User Documents</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-card { background: white; border-radius: 12px; padding: 32px; max-width: 800px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid #ef4444; }
        .log-box { background: #1f2937; color: #10b981; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 400px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; }
        .log-error { color: #ef4444; } .log-warning { color: #f59e0b; } .log-info { color: #3b82f6; }
        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 16px 0; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: width 0.3s ease; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="admin-card">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-red-100 rounded-full mb-4">
                <i class="fas fa-users-cog text-red-600 text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">⚠️ Admin: Update Users</h1>
            <p class="text-gray-600 mt-2">Tambah field baru ke semua user di Firestore</p>
        </div>
        
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6">
            <p class="text-sm text-yellow-700"><strong>⚠️ PERINGATAN:</strong> Script ini mengubah data Firestore. Pastikan Anda admin!</p>
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2"><i class="fas fa-shield-alt mr-2"></i>Password Admin</label>
            <input type="password" id="adminPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="admin123">
            <p class="text-xs text-gray-500 mt-1">Default: admin123 (ganti di kode untuk produksi)</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2"><i class="fas fa-school mr-2"></i>Sekolah Default</label>
                <input type="text" id="defaultSchool" class="w-full px-4 py-2 border border-gray-300 rounded-lg" value="SDN 139 Lamanda">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2"><i class="fas fa-layer-group mr-2"></i>Jenjang Default</label>
                <select id="defaultJenjang" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="sd">SD</option><option value="smp">SMP</option><option value="sma">SMA</option>
                </select>
            </div>
        </div>
        
        <div class="flex gap-4 mb-6">
            <button id="btnPreview" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium" disabled>👁️ Preview</button>
            <button id="btnUpdate" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium" disabled>🔄 Update All</button>
        </div>
        
        <div id="progressSection" class="hidden">
            <div class="flex justify-between text-sm text-gray-600 mb-2">
                <span id="progressText">Processing...</span><span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width: 0%"></div></div>
        </div>
        
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-green-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-green-600" id="statSuccess">0</div><div class="text-xs text-green-700">Berhasil</div></div>
            <div class="bg-red-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-red-600" id="statError">0</div><div class="text-xs text-red-700">Gagal</div></div>
            <div class="bg-blue-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-blue-600" id="statTotal">0</div><div class="text-xs text-blue-700">Total</div></div>
        </div>
        
        <div class="log-box" id="logBox">📝 Ready... Login sebagai admin untuk mulai</div>
        
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-purple-600 mt-6">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <script type="module">
        import { db, auth, collection, getDocs, updateDoc, doc, serverTimestamp } from './modules/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        console.log('🔴 [Admin Update] FIXED Script START');
        
        let allUsers = [];
        let isAdmin = false;
        const ADMIN_PASSWORD = 'admin123'; // GANTI untuk produksi!
        
        const els = {
            pwd: document.getElementById('adminPassword'),
            school: document.getElementById('defaultSchool'),
            jenjang: document.getElementById('defaultJenjang'),
            btnPrev: document.getElementById('btnPreview'),
            btnUpd: document.getElementById('btnUpdate'),
            progSec: document.getElementById('progressSection'),
            progFill: document.getElementById('progressFill'),
            progTxt: document.getElementById('progressText'),
            progPct: document.getElementById('progressPercent'),
            statOk: document.getElementById('statSuccess'),
            statErr: document.getElementById('statError'),
            statTot: document.getElementById('statTotal'),
            log: document.getElementById('logBox')
        };
        
        function log(msg, type = 'info') {
            const ts = new Date().toLocaleTimeString('id-ID');
            const cls = type === 'error' ? 'log-error' : type === 'warning' ? 'log-warning' : 'log-info';
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[${ts}] ${msg}`;
            els.log.appendChild(line);
            els.log.scrollTop = els.log.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${msg}`);
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) { log('❌ Not logged in! Redirecting...', 'error'); setTimeout(() => location.href = 'login.html', 2000); return; }
            log(`✅ Logged in: ${user.email}`, 'info');
            
            try {
                const snap = await getDocs(collection(db, 'users'));
                const userData = snap.docs.find(d => d.id === user.uid)?.data();
                if (userData?.role === 'admin') {
                    isAdmin = true;
                    els.btnPrev.disabled = false;
                    log('✅ Admin access granted!', 'success');
                } else {
                    log(`❌ Access denied! Role: ${userData?.role || 'NOT SET'}`, 'error');
                    els.btnPrev.disabled = true;
                    els.btnUpd.disabled = true;
                }
            } catch (e) {
                log(`❌ Error checking admin: ${e.message}`, 'error');
            }
        });
        
        els.btnPrev.addEventListener('click', async () => {
            log('🔍 Fetching users...', 'info');
            try {
                const snap = await getDocs(collection(db, 'users'));
                allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                log(`✅ Found ${allUsers.length} user(s)`, 'success');
                
                allUsers.forEach((u, i) => {
                    const r = u.role ? '✅' : '❌';
                    const k = u.kelas_diampu ? '✅' : '❌';
                    log(`  ${i+1}. ${u.email || 'N/A'} - Role:${r}${u.role||'?'}, Kelas:${k}`, 'info');
                });
                
                els.statTot.textContent = allUsers.length;
                if (els.pwd.value === ADMIN_PASSWORD) {
                    els.btnUpd.disabled = false;
                    log('✅ Update enabled (password OK)', 'success');
                } else {
                    log('⚠️ Enter admin password to enable update', 'warning');
                }
            } catch (e) {
                log(`❌ Fetch error: ${e.code} - ${e.message}`, 'error');
            }
        });
        
        els.pwd.addEventListener('input', () => {
            if (els.pwd.value === ADMIN_PASSWORD && allUsers.length > 0) {
                els.btnUpd.disabled = false;
                log('✅ Password confirmed', 'success');
            } else {
                els.btnUpd.disabled = true;
            }
        });
        
        els.btnUpd.addEventListener('click', async () => {
            if (!isAdmin) { log('❌ Admin required!', 'error'); return; }
            if (allUsers.length === 0) { log('❌ Click Preview first!', 'error'); return; }
            
            if (!confirm(`⚠️ Update ${allUsers.length} user(s)? Cannot be undone!`)) return;
            
            log('🚀 Starting update...', 'info');
            els.progSec.classList.remove('hidden');
            
            let ok = 0, err = 0;
            const total = allUsers.length;
            const defSchool = els.school.value.trim();
            const defJenjang = els.jenjang.value;
            
            for (let i = 0; i < total; i++) {
                const u = allUsers[i];
                const pct = Math.round(((i+1)/total)*100);
                
                els.progFill.style.width = `${pct}%`;
                els.progPct.textContent = `${pct}%`;
                els.progTxt.textContent = `Updating ${i+1}/${total}`;
                
                try {
                    const upd = {};
                    if (!u.role) { upd.role = 'teacher'; log(`  📝 Add role:teacher for ${u.email}`, 'info'); }
                    if (!u.kelas_diampu) { upd.kelas_diampu = ['1']; log(`  📝 Add kelas:["1"] for ${u.email}`, 'info'); }
                    if (!u.nama_sekolah) { upd.nama_sekolah = defSchool; }
                    if (!u.jenjang_sekolah) { upd.jenjang_sekolah = defJenjang; }
                    if (u.isActive === undefined) upd.isActive = true;
                    if (u.isApproved === undefined) upd.isApproved = true;
                    upd.updatedAt = serverTimestamp();
                    
                    if (Object.keys(upd).length === 0) {
                        log(`  ⏭️ Skip ${u.email} (all fields exist)`, 'warning');
                        ok++; continue;
                    }
                    
                    // ✅ CRITICAL: Add timeout to prevent hanging
                    const updatePromise = updateDoc(doc(db, 'users', u.id), upd);
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Timeout: Update took too long')), 10000)
                    );
                    
                    await Promise.race([updatePromise, timeoutPromise]);
                    
                    ok++;
                    log(`  ✅ Updated: ${u.email}`, 'success');
                    
                } catch (e) {
                    err++;
                    log(`  ❌ Error ${u.email}: ${e.code || e.message}`, 'error');
                }
                
                // Small delay to avoid rate limiting
                await new Promise(r => setTimeout(r, 200));
            }
            
            els.statOk.textContent = ok;
            els.statErr.textContent = err;
            els.progTxt.textContent = 'Complete!';
            
            log('═══════════════════════════════════', 'info');
            log(`🎉 DONE! Success: ${ok}, Errors: ${err}`, 'success');
            log('═══════════════════════════════════', 'info');
            
            alert(`✅ Complete!\nSuccess: ${ok}\nErrors: ${err}\n\nCheck log for details.`);
        });
        
        console.log('🟢 [Admin Update] FIXED READY');
    </script>
</body>
</html>
