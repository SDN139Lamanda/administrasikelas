<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Update Users</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-card { background: white; border-radius: 12px; padding: 32px; max-width: 700px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid #ef4444; }
        .log-box { background: #1f2937; color: #10b981; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 350px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; }
        .log-error { color: #ef4444; } .log-warning { color: #f59e0b; } .log-info { color: #93c5fd; } .log-success { color: #34d399; }
        .progress-bar { height: 12px; background: #e5e7eb; border-radius: 6px; overflow: hidden; margin: 16px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #059669); transition: width 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
        .stat-box { padding: 12px; border-radius: 8px; text-align: center; }
        .stat-ok { background: #dcfce7; color: #166534; }
        .stat-err { background: #fee2e2; color: #991b1b; }
        .stat-tot { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="admin-card">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-red-100 rounded-full mb-3">
                <i class="fas fa-users-cog text-red-600 text-xl"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-900">⚠️ Admin: Update Users</h1>
            <p class="text-gray-600 text-sm">Tambah field ke semua user di Firestore</p>
        </div>
        
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-4 text-sm text-yellow-700">
            <strong>⚠️ PERINGATAN:</strong> Script ini mengubah data Firestore. Pastikan Anda admin!
        </div>
        
        <!-- Password -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-key mr-1"></i>Password Admin</label>
            <input type="password" id="adminPassword" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="admin123">
            <p class="text-xs text-gray-500 mt-1">Default: <code>admin123</code></p>
        </div>
        
        <!-- Config -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-school mr-1"></i>Sekolah</label>
                <input type="text" id="defaultSchool" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" value="SDN 139 Lamanda">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-layer-group mr-1"></i>Jenjang</label>
                <select id="defaultJenjang" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <option value="sd">SD</option><option value="smp">SMP</option><option value="sma">SMA</option>
                </select>
            </div>
        </div>
        
        <!-- Buttons -->
        <div class="flex gap-3 mb-4">
            <button id="btnPreview" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50" disabled>👁️ Preview</button>
            <button id="btnUpdate" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 disabled:opacity-50" disabled>🔄 Update All</button>
        </div>
        
        <!-- Progress -->
        <div id="progressSection" class="hidden">
            <div class="flex justify-between text-xs text-gray-600 mb-1">
                <span id="progressText">Processing...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width: 0%"></div></div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-box stat-ok"><div class="text-lg font-bold" id="statSuccess">0</div><div class="text-xs">Berhasil</div></div>
            <div class="stat-box stat-err"><div class="text-lg font-bold" id="statError">0</div><div class="text-xs">Gagal</div></div>
            <div class="stat-box stat-tot"><div class="text-lg font-bold" id="statTotal">0</div><div class="text-xs">Total</div></div>
        </div>
        
        <!-- Log -->
        <div class="log-box" id="logBox">📝 Ready... Login sebagai admin untuk mulai</div>
        
        <!-- Back -->
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-purple-600 mt-4 text-sm">
            <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
    </div>

    <script type="module">
        import { db, auth, collection, getDocs, updateDoc, doc, serverTimestamp } from './modules/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        console.log('🔴 [Admin Update] SIMPLIFIED Script START');
        
        // Config
        const ADMIN_PASSWORD = 'admin123'; // GANTI untuk produksi!
        const UPDATE_DELAY = 300; // ms antar update
        
        // State
        let allUsers = [];
        let isAdmin = false;
        
        // DOM Elements
        const els = {
            pwd: document.getElementById('adminPassword'),
            school: document.getElementById('defaultSchool'),
            jenjang: document.getElementById('defaultJenjang'),
            btnPrev: document.getElementById('btnPreview'),
            btnUpd: document.getElementById('btnUpdate'),
            progSec: document.getElementById('progressSection'),
            progFill: document.getElementById('progressFill'),
            progTxt: document.getElementById('progressText'),
            progPct: document.getElementById('progressPercent'),
            statOk: document.getElementById('statSuccess'),
            statErr: document.getElementById('statError'),
            statTot: document.getElementById('statTotal'),
            log: document.getElementById('logBox')
        };
        
        // Logger
        function log(msg, type = 'info') {
            const ts = new Date().toLocaleTimeString('id-ID');
            const cls = { error: 'log-error', warning: 'log-warning', success: 'log-success' }[type] || 'log-info';
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[${ts}] ${msg}`;
            els.log.appendChild(line);
            els.log.scrollTop = els.log.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${msg}`);
        }
        
        // Check auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) { log('❌ Not logged in! Redirecting...', 'error'); setTimeout(() => location.href = 'login.html', 2000); return; }
            
            log(`✅ Logged in: ${user.email}`, 'info');
            
            try {
                const snap = await getDocs(collection(db, 'users'));
                const userData = snap.docs.find(d => d.id === user.uid)?.data();
                
                if (userData?.role === 'admin') {
                    isAdmin = true;
                    els.btnPrev.disabled = false;
                    log('✅ Admin access granted!', 'success');
                } else {
                    log(`❌ Access denied! Role: ${userData?.role || 'NOT SET'}`, 'error');
                    els.btnPrev.disabled = true;
                    els.btnUpd.disabled = true;
                }
            } catch (e) {
                log(`❌ Error checking admin: ${e.message}`, 'error');
            }
        });
        
        // Preview button
        els.btnPrev?.addEventListener('click', async () => {
            log('🔍 Fetching users...', 'info');
            
            try {
                const snap = await getDocs(collection(db, 'users'));
                allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                log(`✅ Found ${allUsers.length} user(s)`, 'success');
                
                // Show preview
                log('📋 User Preview:', 'info');
                allUsers.forEach((u, i) => {
                    const r = u.role ? '✅' : '❌';
                    const k = u.kelas_diampu ? '✅' : '❌';
                    log(`  ${i+1}. ${u.email || 'N/A'} - Role:${r}${u.role||'?'}, Kelas:${k}`, 'info');
                });
                
                // Update stats
                els.statTot.textContent = allUsers.length;
                
                // Enable update if password OK
                if (els.pwd.value === ADMIN_PASSWORD) {
                    els.btnUpd.disabled = false;
                    log('✅ Update enabled (password OK)', 'success');
                } else {
                    log('⚠️ Enter admin password to enable update', 'warning');
                }
                
            } catch (e) {
                log(`❌ Fetch error: ${e.code || e.message}`, 'error');
            }
        });
        
        // Password input
        els.pwd?.addEventListener('input', () => {
            if (els.pwd.value === ADMIN_PASSWORD && allUsers.length > 0) {
                els.btnUpd.disabled = false;
                log('✅ Password confirmed', 'success');
            } else {
                els.btnUpd.disabled = true;
            }
        });
        
        // Update button - SIMPLIFIED & ROBUST
        els.btnUpd?.addEventListener('click', async () => {
            log('🎯 Update button clicked!', 'info'); // DEBUG: Confirm click
            
            if (!isAdmin) { log('❌ Admin required!', 'error'); return; }
            if (allUsers.length === 0) { log('❌ Click Preview first!', 'error'); return; }
            
            if (!confirm(`⚠️ Update ${allUsers.length} user(s)?\n\nThis cannot be undone!`)) {
                log('⚠️ Update cancelled by user', 'warning');
                return;
            }
            
            log('🚀 Starting update...', 'info');
            els.progSec.classList.remove('hidden');
            
            let ok = 0, err = 0;
            const total = allUsers.length;
            const defSchool = els.school.value.trim();
            const defJenjang = els.jenjang.value;
            
            // Process each user
            for (let i = 0; i < total; i++) {
                const u = allUsers[i];
                const pct = Math.round(((i+1)/total)*100);
                
                // Update UI - FORCE refresh
                els.progFill.style.width = `${pct}%`;
                els.progPct.textContent = `${pct}%`;
                els.progTxt.textContent = `Updating ${i+1}/${total}`;
                
                // Force browser repaint
                await new Promise(r => setTimeout(r, 10));
                
                log(`📦 Processing ${i+1}/${total}: ${u.email || 'N/A'}`, 'info');
                
                try {
                    // Build update data
                    const upd = {};
                    if (!u.role) { upd.role = 'teacher'; }
                    if (!u.kelas_diampu) { upd.kelas_diampu = ['1']; }
                    if (!u.nama_sekolah) { upd.nama_sekolah = defSchool; }
                    if (!u.jenjang_sekolah) { upd.jenjang_sekolah = defJenjang; }
                    if (u.isActive === undefined) { upd.isActive = true; }
                    if (u.isApproved === undefined) { upd.isApproved = true; }
                    upd.updatedAt = serverTimestamp();
                    
                    // Skip if nothing to update
                    if (Object.keys(upd).length === 0) {
                        log(`  ⏭️ Skip (all fields exist)`, 'warning');
                        ok++;
                        continue;
                    }
                    
                    // Perform update
                    log(`  📝 Updating fields: ${Object.keys(upd).join(', ')}`, 'info');
                    await updateDoc(doc(db, 'users', u.id), upd);
                    
                    ok++;
                    els.statOk.textContent = ok;
                    log(`  ✅ Updated successfully`, 'success');
                    
                } catch (e) {
                    err++;
                    els.statErr.textContent = err;
                    log(`  ❌ Error: ${e.code || e.message}`, 'error');
                }
                
                // Delay to avoid rate limiting
                await new Promise(r => setTimeout(r, UPDATE_DELAY));
            }
            
            // Final update
            els.progFill.style.width = '100%';
            els.progPct.textContent = '100%';
            els.progTxt.textContent = 'Complete!';
            
            // Final log
            log('═══════════════════════════════════', 'info');
            log(`🎉 DONE! Success: ${ok}, Errors: ${err}`, 'success');
            log('═══════════════════════════════════', 'info');
            
            // Show alert
            alert(`✅ Update Complete!\n\nSuccess: ${ok}\nErrors: ${err}\n\nCheck log for details.`);
            
            log('🏁 Script finished', 'info');
        });
        
        console.log('🟢 [Admin Update] SIMPLIFIED READY');
    </script>
</body>
</html>
